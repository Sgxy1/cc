<!DOCTYPE html>

<head><meta charset="UTF-8"><title>帮助中心</title></head>
<body>
<h1>帮助中心</h1>
<p>欢迎使用用户管理系统！</p>
<h2>常见问题</h2>
<ul>
    <li>如何注册？点击导航栏"注册"链接，填写信息即可完成注册。</li>
    <li>如何充值？登录后进入"个人中心"，输入金额点击充值。</li>
    <li>如何上传头像？登录后点击"上传头像"，选择图片文件上传。</li>
    <li>忘记密码怎么办？请联系管理员重置密码。</li>
</ul>
</body>
