{% extends "base.html" %}
{% block title %}个人中心{% endblock %}
{% block content %}
{% if user %}
<div class="card">
    <h1>个人中心</h1>
    <table class="info-table">
        <tr><th>ID</th><td>{{ user.id }}</td></tr>
        <tr><th>用户名</th><td>{{ user.username }}</td></tr>
        <tr><th>邮箱</th><td>{{ user.email }}</td></tr>
        <tr><th>手机</th><td>{{ user.phone }}</td></tr>
        <tr><th>余额</th><td>{{ user.balance }}</td></tr>
    </table>
    <h2>充值</h2>
    <form method="POST" action="{{ url_for('recharge') }}">
        <input type="hidden" name="user_id" value="{{ user.id }}">
        <div class="form-group">
            <label for="amount">充值金额</label>
            <input type="number" id="amount" name="amount" placeholder="请输入金额" required>
        </div>
        <button type="submit" class="btn">充值</button>
    </form>
</div>
{% else %}
<div class="card">
    <h1>个人中心</h1>
    <p>用户不存在</p>
</div>
{% endif %}
{% endblock %}
