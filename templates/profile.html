{% extends "base.html" %}
{% block title %}个人中心{% endblock %}
{% block content %}
{% if user %}
<div class="card">
    <h1>个人中心</h1>
    <table class="info-table">
        <tr><th>ID</th><td>{{ user.id }}</td></tr>
        <tr><th>用户名</th><td>{{ user.username }}</td></tr>
        <tr><th>邮箱</th><td>{{ user.email }}</td></tr>
        <tr><th>手机</th><td>{{ user.phone }}</td></tr>
        <tr><th>余额</th><td>{{ user.balance }}</td></tr>
    </table>
    <h2>充值</h2>
    <form method="POST" action="{{ url_for('recharge') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div class="form-group">
            <label for="amount">充值金额</label>
            <input type="number" id="amount" name="amount" placeholder="请输入金额" required>
        </div>
        <button type="submit" class="btn">充值</button>
    </form>
    <h2>修改密码</h2>
    <form method="POST" action="{{ url_for('change_password') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div class="form-group">
            <label for="old_password">原密码</label>
            <input type="password" id="old_password" name="old_password" placeholder="请输入原密码" required>
        </div>
        <div class="form-group">
            <label for="new_password">新密码</label>
            <input type="password" id="new_password" name="new_password" placeholder="请输入新密码" required>
        </div>
        <div class="form-group">
            <label for="confirm_password">确认密码</label>
            <input type="password" id="confirm_password" name="confirm_password" placeholder="请确认新密码" required>
        </div>
        <button type="submit" class="btn">修改密码</button>
    </form>
</div>
{% else %}
<div class="card">
    <h1>个人中心</h1>
    <p>用户不存在</p>
</div>
{% endif %}
{% endblock %}
