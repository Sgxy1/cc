{% extends "base.html" %}
{% block title %}Ping 测试{% endblock %}
{% block content %}
<div class="card">
    <h1>Ping 测试</h1>
    <form method="POST" action="{{ url_for('ping') }}" class="search-form">
        <div class="search-box">
            <input type="text" name="ip" class="search-input" placeholder="输入 IP 地址" required>
            <button type="submit" class="btn">Ping</button>
        </div>
    </form>
    {% if result %}
    <h3>执行结果：</h3>
    <div class="console-output">{{ result }}</div>
    {% endif %}
</div>
{% endblock %}
