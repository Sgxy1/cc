<h1>帮助中心</h1>
<p>欢迎使用用户管理系统！以下是常见问题的解答。</p>

<h2>常见问题</h2>
<ul>
    <li><strong>如何注册？</strong>点击导航栏"注册"链接，填写用户名、密码等信息即可完成注册。</li>
    <li><strong>如何充值？</strong>登录后进入"个人中心"，输入金额点击充值即可。</li>
    <li><strong>如何上传头像？</strong>登录后点击"上传头像"，选择图片文件上传。</li>
    <li><strong>忘记密码怎么办？</strong>请联系管理员重置密码。</li>
</ul>

<h2>功能说明</h2>
<ul>
    <li>用户管理：注册、登录、个人信息查看与修改</li>
    <li>搜索功能：支持用户名和邮箱模糊搜索</li>
    <li>头像上传：支持 JPG、PNG、GIF 格式图片</li>
    <li>充值功能：为账户余额充值</li>
    <li>Ping 测试：网络诊断工具</li>
</ul>
